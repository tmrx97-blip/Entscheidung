<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interaktives Abenteuer</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      line-height: 1.6;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .screen {
      display: none;
    }
    .screen.active {
      display: block;
    }
    #stats {
      display: flex;
      justify-content: space-between;
      background-color: #1e1e1e;
      padding: 10px 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .stat {
      text-align: center;
    }
    .stat-value {
      font-weight: bold;
      color: #4CAF50;
    }
    #story-text {
      background-color: #1e1e1e;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      min-height: 100px;
    }
    .choice-button {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      background-color: #2d2d2d;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .choice-button:hover {
      background-color: #3a3a3a;
    }
    #abbruch-button {
      background-color: #f44336;
      margin-top: 10px;
    }
    #abbruch-button:hover {
      background-color: #d32f2f;
    }
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal.active {
      display: flex;
    }
    .modal-content {
      background-color: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 500px;
      text-align: center;
    }
    .modal-button {
      display: block;
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background-color: #2d2d2d;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #save-name {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background-color: #2d2d2d;
      color: white;
      border: 1px solid #444;
      border-radius: 5px;
    }
    #saved-games {
      list-style: none;
      padding: 0;
    }
    #saved-games li {
      margin: 10px 0;
    }
    #saved-games button {
      width: 100%;
      padding: 10px;
      background-color: #2d2d2d;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    h1, h2 {
      color: #BB86FC;
    }
    .parameter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .parameter-option {
      background-color: #1e1e1e;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .parameter-option:hover {
      background-color: #2d2d2d;
    }
    .parameter-option.selected {
      background-color: #BB86FC;
      color: white;
      border-color: #fff;
    }
    @media (max-width: 600px) {
      .parameter-grid {
        grid-template-columns: 1fr;
      }
      .choice-button {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div id="parameter-screen" class="screen active">
    <h1>Dein Abenteuer beginnt!</h1>
    <p>Wähle deine Eigenschaften:</p>
    <div class="parameter-section">
      <h3>Alter</h3>
      <div class="parameter-grid" id="alter-options"></div>
    </div>
    <div class="parameter-section">
      <h3>Beruf</h3>
      <div class="parameter-grid" id="beruf-options"></div>
    </div>
    <div class="parameter-section">
      <h3>Genre</h3>
      <div class="parameter-grid" id="genre-options"></div>
    </div>
    <div class="parameter-section">
      <h3>Moralischer Fokus</h3>
      <div class="parameter-grid" id="fokus-options"></div>
    </div>
    <div class="parameter-section">
      <h3>Sprachstil</h3>
      <div class="parameter-grid" id="stil-options"></div>
    </div>
    <div class="parameter-section">
      <h3>Konsequenz-Level</h3>
      <div class="parameter-grid" id="konsequenz-options"></div>
    </div>
    <div class="parameter-section">
      <h3>Kernziel</h3>
      <div class="parameter-grid" id="ziel-options"></div>
    </div>
    <button id="start-game" class="choice-button">Spiel starten</button>
  </div>

  <div id="game-screen" class="screen">
    <div id="stats">
      <div class="stat">Mut: <span id="stat-mut" class="stat-value">0</span></div>
      <div class="stat">Logik: <span id="stat-logik" class="stat-value">0</span></div>
      <div class="stat">Empathie: <span id="stat-empathie" class="stat-value">0</span></div>
      <div class="stat">Gerechtigkeit: <span id="stat-gerechtigkeit" class="stat-value">0</span></div>
    </div>
    <div id="story-text"></div>
    <div id="choices"></div>
    <button id="abbruch-button" class="choice-button">Abbruch</button>
  </div>

  <div id="abbruch-menu" class="modal">
    <div class="modal-content">
      <h2>Spiel unterbrechen</h2>
      <button id="weiterspielen" class="modal-button">Weiterspielen</button>
      <button id="speichern-beenden" class="modal-button">Speichern & Beenden</button>
    </div>
  </div>

  <div id="save-menu" class="modal">
    <div class="modal-content">
      <h2>Spiel speichern</h2>
      <input type="text" id="save-name" placeholder="Name (z. B. Uwe)">
      <div id="save-slots">
        <button onclick="saveGame(1)" class="modal-button">Slot 1</button>
        <button onclick="saveGame(2)" class="modal-button">Slot 2</button>
        <button onclick="saveGame(3)" class="modal-button">Slot 3</button>
        <button onclick="saveGame(4)" class="modal-button">Slot 4</button>
        <button onclick="saveGame(5)" class="modal-button">Slot 5</button>
      </div>
      <button id="cancel-save" class="modal-button">Abbrechen</button>
    </div>
  </div>

  <div id="load-screen" class="screen">
    <h1>Spielstand laden</h1>
    <ul id="saved-games"></ul>
    <button id="new-game" class="choice-button">Neues Spiel</button>
  </div>

  <script type="application/json" id="parameters">
    {
      "alter": [
        {"value": "kind", "label": "Kind (10–12)", "desc": "Einfache Sprache, magische Abenteuer."},
        {"value": "teen", "label": "Teenager (13–18)", "desc": "Komplexere Rätsel und moralische Dilemmata."},
        {"value": "erwachsener", "label": "Erwachsener", "desc": "Tiefgründige Dialoge und strategische Entscheidungen."},
        {"value": "senior", "label": "Senior (60+)", "desc": "Weisheit und Erfahrung spielen eine zentrale Rolle."}
      ],
      "beruf": [
        {"value": "detektiv", "label": "Detektiv", "desc": "Findet Hinweise und löst Rätsel."},
        {"value": "kuenstler", "label": "Künstler", "desc": "Sieht Schönheit und Details, die andere übersehen."},
        {"value": "forscher", "label": "Forscher", "desc": "Analysiert Phänomene und entdeckt Geheimnisse."},
        {"value": "handwerker", "label": "Handwerker", "desc": "Repariert, baut und nutzt Werkzeuge."}
      ],
      "genre": [
        {"value": "high_fantasy", "label": "High Fantasy", "desc": "Magie, Drachen und epische Quests."},
        {"value": "cyberpunk", "label": "Cyberpunk", "desc": "Neonlichter, Hacker und eine dystopische Zukunft."},
        {"value": "noir", "label": "Noir Krimi", "desc": "Dunkle Gassen, Geheimnisse und moralische Grauzonen."},
        {"value": "real_life", "label": "Real-Life Mystery", "desc": "Alltagsrätsel mit überraschenden Wendungen."}
      ],
      "fokus": [
        {"value": "empathie", "label": "Empathie", "desc": "Mitgefühl steht im Mittelpunkt."},
        {"value": "logik", "label": "Logik", "desc": "Analytisches Denken ist entscheidend."},
        {"value": "mut", "label": "Mut", "desc": "Tapferkeit wird belohnt."},
        {"value": "gerechtigkeit", "label": "Gerechtigkeit", "desc": "Moralische Entscheidungen haben Konsequenzen."}
      ],
      "stil": [
        {"value": "poetisch", "label": "Poetisch", "desc": "Blumige, bildhafte Sprache."},
        {"value": "sachlich", "label": "Sachlich", "desc": "Klare, präzise Formulierungen."},
        {"value": "episch", "label": "Episch", "desc": "Dramatische, heroische Erzählweise."},
        {"value": "ironisch", "label": "Ironisch", "desc": "Sarkasmus und humorvolle Untertöne."}
      ],
      "konsequenz": [
        {"value": "sanft", "label": "Sanft", "desc": "Entscheidungen haben emotionale Folgen."},
        {"value": "realistisch", "label": "Realistisch", "desc": "Ursache-Wirkung wie im echten Leben."},
        {"value": "hart", "label": "Hart", "desc": "Fehler können schwerwiegende Konsequenzen haben."},
        {"value": "unvorhersehbar", "label": "Unvorhersehbar", "desc": "Zufall spielt eine große Rolle."}
      ],
      "ziel": [
        {"value": "wissen", "label": "Wissen lernen", "desc": "Fakten und Fähigkeiten vermitteln."},
        {"value": "ethik", "label": "Ethische Debatte", "desc": "Moralische Fragen im Fokus."},
        {"value": "entspannung", "label": "Entspannung", "desc": "Meditative, ruhige Erfahrung."},
        {"value": "nervenkitzel", "label": "Nervenkitzel", "desc": "Spannung und Adrenalin."}
      ]
    }
  </script>

  <script type="application/json" id="scenes">
    {
      "scenes": {
        "start": {
          "text": "Willkommen in deinem Abenteuer! Du bist ein {ALTER_LABEL} {BERUF_LABEL} in einer {GENRE_LABEL}-Welt. Dein Fokus liegt auf {FOKUS_LABEL}, und dein Ziel ist es, {ZIEL_LABEL}.",
          "choices": [
            {"text": "Abenteuer beginnen!", "nextScene": "1"}
          ]
        },
        "1": {
          "text": "Du stehst vor einer alten Tür. {BERUF_DESC} Was tust du?",
          "choices": [
            {
              "text": "Tür öffnen",
              "nextScene": "2",
              "condition": {"stat": "mut", "value": 0}
            },
            {
              "text": "Erst nachdenken",
              "nextScene": "3",
              "condition": {"stat": "logik", "value": 0}
            }
          ]
        },
        "2": {
          "text": "Hinter der Tür findest du einen {GENRE_SPECIFIC_OBJECT}!",
          "choices": [
            {"text": "Weitergehen", "nextScene": "start"}
          ],
          "onEnter": {
            "updateStats": {"mut": 5}
          }
        },
        "3": {
          "text": "Du überlegst sorgfältig. Vielleicht war das die klügere Wahl...",
          "choices": [
            {"text": "Zurück zur Tür", "nextScene": "1"}
          ],
          "onEnter": {
            "updateStats": {"logik": 5}
          }
        }
      },
      "sceneVars": {
        "GENRE_SPECIFIC_OBJECT": {
          "high_fantasy": "magischen Kelch",
          "cyberpunk": "leuchtenden Datenstick",
          "noir": "alten Briefbeschwerer",
          "real_life": "verstaubten Schlüssel"
        }
      }
    }
  </script>

  <script>
    let gameState = {
      selectedParameters: {},
      currentScene: "start",
      stats: { mut: 0, logik: 0, empathie: 0, gerechtigkeit: 0 },
      sceneVars: {},
      inventory: []
    };

    const parameterScreen = document.getElementById('parameter-screen');
    const gameScreen = document.getElementById('game-screen');
    const storyText = document.getElementById('story-text');
    const choicesContainer = document.getElementById('choices');

    const parameters = JSON.parse(document.getElementById('parameters').textContent);
    const scenesData = JSON.parse(document.getElementById('scenes').textContent);

    function renderParameterOptions(category, containerId) {
      const container = document.getElementById(containerId);
      parameters[category].forEach(option => {
        const optionElement = document.createElement('div');
        optionElement.className = 'parameter-option';
        optionElement.textContent = `${option.label}: ${option.desc}`;
        optionElement.onclick = () => selectParameter(category, option.value, optionElement);
        container.appendChild(optionElement);
      });
    }

    function selectParameter(category, value, element) {
      const siblings = element.parentNode.querySelectorAll('.parameter-option');
      siblings.forEach(el => el.classList.remove('selected'));
      element.classList.add('selected');
      gameState.selectedParameters[category] = value;
    }

    document.getElementById('start-game').onclick = () => {
      if (Object.keys(gameState.selectedParameters).length === 7) {
        parameterScreen.classList.remove('active');
        gameScreen.classList.add('active');
        renderScene("start");
      } else {
        alert('Bitte wähle aus jeder Kategorie eine Eigenschaft aus!');
      }
    };

    function renderScene(sceneId) {
      gameState.currentScene = sceneId;
      const scene = scenesData.scenes[sceneId];
      if (!scene) return;

      if (scene.onEnter && scene.onEnter.updateStats) {
        Object.entries(scene.onEnter.updateStats).forEach(([stat, val]) => {
          gameState.stats[stat] += val;
        });
      }
      updateStatsUI();

      let text = scene.text;
      Object.entries(gameState.selectedParameters).forEach(([key, value]) => {
        const p = parameters[key].find(opt => opt.value === value);
        text = text.replace(new RegExp(`{${key.toUpperCase()}_LABEL}`, 'g'), p.label);
        text = text.replace(new RegExp(`{${key.toUpperCase()}_DESC}`, 'g'), p.desc);
      });

      const genre = gameState.selectedParameters.genre;
      Object.entries(scenesData.sceneVars).forEach(([varName, options]) => {
        if (options[genre]) {
          text = text.replace(new RegExp(`{${varName}}`, 'g'), options[genre]);
        }
      });

      storyText.textContent = text;
      choicesContainer.innerHTML = '';

      scene.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-button';
        btn.textContent = choice.text;
        btn.onclick = () => renderScene(choice.nextScene);
        choicesContainer.appendChild(btn);
      });
    }

    function updateStatsUI() {
      document.getElementById('stat-mut').textContent = gameState.stats.mut;
      document.getElementById('stat-logik').textContent = gameState.stats.logik;
      document.getElementById('stat-empathie').textContent = gameState.stats.empathie;
      document.getElementById('stat-gerechtigkeit').textContent = gameState.stats.gerechtigkeit;
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderParameterOptions('alter', 'alter-options');
      renderParameterOptions('beruf', 'beruf-options');
      renderParameterOptions('genre', 'genre-options');
      renderParameterOptions('fokus', 'fokus-options');
      renderParameterOptions('stil', 'stil-options');
      renderParameterOptions('konsequenz', 'konsequenz-options');
      renderParameterOptions('ziel', 'ziel-options');
    });
  </script>
</body>
</html>
